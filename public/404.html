<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Sofi - React Companion</title>
    <script type="text/javascript">
      var segmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/' +
        l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') +
        '/?p=/' + l.pathname.split('/').slice(1 + segmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
